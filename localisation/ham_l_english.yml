l_english:
 hand_over_mandate_decision_title: "Hand Over the Mandate"
 hand_over_mandate_decision_desc: "The burdens of Heaven weigh heavily upon the throne. The Son of Heaven may choose to pass the Mandate to a worthy neighbor or tributary of his own choosing."
 ham_events.1.t: "Abdication of the Son of Heaven"
 ham_events.1.d: "The court astrologers have read the portents: the dynasty's virtue wanes, and Heaven's favor may be passed on with grace rather than lost in fire and rebellion. Ministers present the strongest candidates worthy of receiving the Mandate."
 ham_events.1.o1: "Bestow the Mandate upon [ham_slot_1.GetName]"
 ham_events.1.o2: "Bestow the Mandate upon [ham_slot_2.GetName]"
 ham_events.1.o3: "Bestow the Mandate upon [ham_slot_3.GetName]"
 ham_events.1.o4: "Bestow the Mandate upon [ham_slot_4.GetName]"
 ham_events.1.o5: "Bestow the Mandate upon [ham_slot_5.GetName]"
 ham_events.1.o6: "Bestow the Mandate upon [ham_slot_6.GetName]"
 ham_events.1.o7: "Bestow the Mandate upon [ham_slot_7.GetName]"
 ham_events.1.o8: "Bestow the Mandate upon [ham_slot_8.GetName]"
 ham_events.1.oc: "On second thought, Heaven's favor remains with us."
 ham_events.2.t: "The Mandate Passes to Us"
 ham_events.2.d: "In a ceremony of unprecedented humility, [From.GetName] has voluntarily yielded the Mandate of Heaven to our nation. The Son of Heaven now reigns from our court."
 ham_events.2.a: "Heaven smiles upon us!"
