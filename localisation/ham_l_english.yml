l_english:
 hand_over_mandate_decision_title:0 "Hand Over the Mandate"
 hand_over_mandate_decision_desc:0 "In the golden age, Yao yielded the throne to Shun, and Shun to Yu - not to their sons, but to the most capable, and Heaven approved. The Son of Heaven may follow the way of the sage-kings and hand the Mandate to a worthy neighbor or tributary of his own choosing - if they accept it. A Mandate freely given is never lost: no calamity follows the sage who yields. Once handed over, five years must pass before the Mandate may be handed over again."
 ham_events.1.t:0 "Abdication of the Son of Heaven"
 ham_events.1.d:0 "The court astrologers have read the portents: the dynasty's virtue wanes. The ministers recall the way of Yao and Shun, of Yu and Tang - the throne passed freely to the most capable, and Heaven smiled upon it. Better to yield the Mandate with grace than lose it in fire and rebellion. The ministers present the strongest candidates worthy of receiving it."
 ham_events.1.o1:0 "Offer the Mandate to [ham_slot_1.GetName]"
 ham_events.1.o2:0 "Offer the Mandate to [ham_slot_2.GetName]"
 ham_events.1.o3:0 "Offer the Mandate to [ham_slot_3.GetName]"
 ham_events.1.o4:0 "Offer the Mandate to [ham_slot_4.GetName]"
 ham_events.1.o5:0 "Offer the Mandate to [ham_slot_5.GetName]"
 ham_events.1.o6:0 "Offer the Mandate to [ham_slot_6.GetName]"
 ham_events.1.o7:0 "Offer the Mandate to [ham_slot_7.GetName]"
 ham_events.1.o8:0 "Offer the Mandate to [ham_slot_8.GetName]"
 ham_events.1.oc:0 "On second thought, Heaven's favor remains with us."
 ham_events.3.t:0 "The Mandate Has Passed"
 ham_events.3.d:0 "As Yao once raised Shun from the fields, so have we raised [From.GetName] to the Celestial Throne. The rites are complete; the most capable now reigns, and our dynasty's name joins the sage-kings who knew when to yield. Our tributaries watch closely: shall they follow the Mandate to its new keeper, or remain bound to us?"
 ham_events.3.o_release:0 "Let our tributaries follow the Mandate."
 ham_events.3.o_keep:0 "Our tributaries remain ours."
 ham_events.3.o_done:0 "It is done."
 ham_events.4.t:0 "An Offer from the Son of Heaven"
 ham_events.4.d:0 "Envoys from [From.GetName] arrive bearing an offer unheard of in living memory, yet ancient as Yao and Shun: the Son of Heaven judges us the most capable of bearing the Mandate of Heaven, and wishes to yield it to us freely. A Mandate freely given carries no curse - only Heaven's favor upon the worthy."
 ham_events.4.a:0 "We humbly accept Heaven's favor."
 ham_events.4.r:0 "We must decline this poisoned gift."
 ham_events.5.t:0 "The Offer Is Refused"
 ham_events.5.d:0 "[From.GetName] has declined the Mandate of Heaven, as the hermit Xu You once washed his ears at Yao's offer of the throne. The court is stunned - who refuses the favor of Heaven itself? Perhaps another candidate will prove more willing."
 ham_events.5.oa:0 "Present another candidate."
 ham_events.5.ob:0 "Heaven's will is fickle. We shall keep the Mandate."
 ham_grateful_for_mandate:0 "Received the Mandate Freely"
 ham_snubbed_candidate:0 "Passed Over for the Mandate"
 ham_refused_mandate:0 "Refused the Mandate"
