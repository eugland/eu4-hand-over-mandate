l_spanish:
 hand_over_mandate_decision_title:0 "Entregar el Mandato"
 hand_over_mandate_decision_desc:0 "En la edad dorada, Yao cedió el trono a Shun, y Shun a Yu - no a sus hijos, sino a los más capaces, y el Cielo lo aprobó. El Hijo del Cielo puede seguir el camino de los reyes sabios y entregar el Mandato a un vecino o tributario digno de su elección, si este lo acepta. Un Mandato entregado libremente nunca se pierde: ninguna calamidad alcanza al sabio que cede. Una vez entregado, deben pasar cinco años antes de poder entregarlo de nuevo."
 ham_events.1.t:0 "Abdicación del Hijo del Cielo"
 ham_events.1.d:0 "Los astrólogos de la corte han leído los presagios: la virtud de la dinastía mengua. Los ministros recuerdan el camino de Yao y Shun, de Yu y Tang - el trono cedido libremente al más capaz, y el Cielo sonreía. Mejor ceder el Mandato con gracia que perderlo en fuego y rebelión. Los ministros presentan a los candidatos más dignos de recibirlo."
 ham_events.1.o1:0 "Ofrecer el Mandato a [ham_slot_1.GetName]"
 ham_events.1.o2:0 "Ofrecer el Mandato a [ham_slot_2.GetName]"
 ham_events.1.o3:0 "Ofrecer el Mandato a [ham_slot_3.GetName]"
 ham_events.1.o4:0 "Ofrecer el Mandato a [ham_slot_4.GetName]"
 ham_events.1.o5:0 "Ofrecer el Mandato a [ham_slot_5.GetName]"
 ham_events.1.o6:0 "Ofrecer el Mandato a [ham_slot_6.GetName]"
 ham_events.1.o7:0 "Ofrecer el Mandato a [ham_slot_7.GetName]"
 ham_events.1.o8:0 "Ofrecer el Mandato a [ham_slot_8.GetName]"
 ham_events.1.oc:0 "Pensándolo bien, el favor del Cielo permanece con nosotros."
 ham_events.3.t:0 "El Mandato ha pasado"
 ham_events.3.d:0 "Como Yao alzó un día a Shun desde los campos, así hemos alzado a [From.GetName] al Trono Celestial. Los ritos están cumplidos; el más capaz reina ahora, y el nombre de nuestra dinastía se une al de los reyes sabios que supieron ceder. Nuestros tributarios observan atentamente: ¿seguirán al Mandato hasta su nuevo guardián, o permanecerán ligados a nosotros?"
 ham_events.3.o_release:0 "Que nuestros tributarios sigan al Mandato."
 ham_events.3.o_keep:0 "Nuestros tributarios siguen siendo nuestros."
 ham_events.3.o_done:0 "Está hecho."
 ham_events.4.t:0 "Una oferta del Hijo del Cielo"
 ham_events.4.d:0 "Emisarios de [From.GetName] llegan con una oferta inaudita en la memoria viva, pero antigua como Yao y Shun: el Hijo del Cielo nos juzga los más capaces de portar el Mandato del Cielo y desea cedérnoslo libremente. Un Mandato entregado libremente no porta maldición alguna - solo el favor del Cielo hacia los dignos."
 ham_events.4.a:0 "Aceptamos humildemente el favor del Cielo."
 ham_events.4.r:0 "Debemos rechazar este regalo envenenado."
 ham_events.5.t:0 "La oferta es rechazada"
 ham_events.5.d:0 "[From.GetName] ha rechazado el Mandato del Cielo, como el ermitaño Xu You se lavó un día los oídos ante la oferta del trono de Yao. La corte está atónita: ¿quién rechaza el favor del mismísimo Cielo? Quizá otro candidato se muestre más dispuesto."
 ham_events.5.oa:0 "Presentar a otro candidato."
 ham_events.5.ob:0 "La voluntad del Cielo es caprichosa. Conservaremos el Mandato."
 ham_grateful_for_mandate:0 "Recibió el Mandato libremente"
 ham_snubbed_candidate:0 "Ignorado para el Mandato"
 ham_refused_mandate:0 "Rechazó el Mandato"
