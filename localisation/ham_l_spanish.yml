l_spanish:
 hand_over_mandate_decision_title:0 "Entregar el Mandato"
 hand_over_mandate_decision_desc:0 "La carga del Cielo pesa sobre el trono. El Hijo del Cielo puede ofrecer el Mandato a un vecino o tributario digno de su elección, si este lo acepta. Una vez entregado el Mandato, deben pasar cinco años antes de poder entregarlo de nuevo."
 ham_events.1.t:0 "Abdicación del Hijo del Cielo"
 ham_events.1.d:0 "Los astrólogos de la corte han leído los presagios: la virtud de la dinastía mengua, y el favor del Cielo puede transmitirse con gracia en lugar de perderse en fuego y rebelión. Los ministros presentan a los candidatos más dignos de recibir el Mandato."
 ham_events.1.o1:0 "Ofrecer el Mandato a [ham_slot_1.GetName]"
 ham_events.1.o2:0 "Ofrecer el Mandato a [ham_slot_2.GetName]"
 ham_events.1.o3:0 "Ofrecer el Mandato a [ham_slot_3.GetName]"
 ham_events.1.o4:0 "Ofrecer el Mandato a [ham_slot_4.GetName]"
 ham_events.1.o5:0 "Ofrecer el Mandato a [ham_slot_5.GetName]"
 ham_events.1.o6:0 "Ofrecer el Mandato a [ham_slot_6.GetName]"
 ham_events.1.o7:0 "Ofrecer el Mandato a [ham_slot_7.GetName]"
 ham_events.1.o8:0 "Ofrecer el Mandato a [ham_slot_8.GetName]"
 ham_events.1.oc:0 "Pensándolo bien, el favor del Cielo permanece con nosotros."
 ham_events.3.t:0 "El Mandato ha pasado"
 ham_events.3.d:0 "En una ceremonia de humildad sin precedentes, nuestra corte ha cedido el Mandato del Cielo a [From.GetName]. El Hijo del Cielo reina ahora desde su corte. Nuestros tributarios observan atentamente: ¿seguirán al Mandato hasta su nuevo guardián, o permanecerán ligados a nosotros?"
 ham_events.3.o_release:0 "Que nuestros tributarios sigan al Mandato."
 ham_events.3.o_keep:0 "Nuestros tributarios siguen siendo nuestros."
 ham_events.3.o_done:0 "Está hecho."
 ham_events.4.t:0 "Una oferta del Hijo del Cielo"
 ham_events.4.d:0 "Emisarios de [From.GetName] llegan con una oferta sin precedentes: el Hijo del Cielo desea ceder el Mandato del Cielo a nuestra nación, transmitiendo el favor del Cielo con gracia en lugar de perderlo en fuego y rebelión."
 ham_events.4.a:0 "Aceptamos humildemente el favor del Cielo."
 ham_events.4.r:0 "Debemos rechazar este regalo envenenado."
 ham_events.5.t:0 "La oferta es rechazada"
 ham_events.5.d:0 "[From.GetName] ha rechazado el Mandato del Cielo. La corte está atónita: ¿quién rechaza el favor del mismísimo Cielo? Quizá otro candidato se muestre más dispuesto."
 ham_events.5.oa:0 "Presentar a otro candidato."
 ham_events.5.ob:0 "La voluntad del Cielo es caprichosa. Conservaremos el Mandato."
 ham_grateful_for_mandate:0 "Agradecido por el Mandato"
 ham_snubbed_candidate:0 "Ignorado para el Mandato"
 ham_refused_mandate:0 "Rechazó el Mandato"
