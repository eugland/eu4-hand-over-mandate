l_french:
 hand_over_mandate_decision_title:0 "Transmettre le Mandat Céleste"
 hand_over_mandate_decision_desc:0 "À l'âge d'or, Yao céda le trône à Shun, et Shun à Yu - non à leurs fils, mais aux plus capables, et le Ciel approuva. Le Fils du Ciel peut suivre la voie des rois-sages et transmettre le Mandat à un voisin ou à un tributaire digne de son choix - s'il l'accepte. Un Mandat librement donné n'est jamais perdu : nulle calamité ne frappe le sage qui cède. Une fois transmis, cinq années doivent s'écouler avant que le Mandat ne puisse l'être à nouveau."
 ham_events.1.t:0 "Abdication du Fils du Ciel"
 ham_events.1.d:0 "Les astrologues de la cour ont lu les présages : la vertu de la dynastie décline. Les ministres rappellent la voie de Yao et de Shun, de Yu et de Tang - le trône librement transmis au plus capable, et le Ciel en souriait. Mieux vaut céder le Mandat avec grâce que le perdre dans le feu et la rébellion. Les ministres présentent les candidats les plus dignes de le recevoir."
 ham_events.1.o1:0 "Offrir le Mandat à [ham_slot_1.GetName]"
 ham_events.1.o2:0 "Offrir le Mandat à [ham_slot_2.GetName]"
 ham_events.1.o3:0 "Offrir le Mandat à [ham_slot_3.GetName]"
 ham_events.1.o4:0 "Offrir le Mandat à [ham_slot_4.GetName]"
 ham_events.1.o5:0 "Offrir le Mandat à [ham_slot_5.GetName]"
 ham_events.1.o6:0 "Offrir le Mandat à [ham_slot_6.GetName]"
 ham_events.1.o7:0 "Offrir le Mandat à [ham_slot_7.GetName]"
 ham_events.1.o8:0 "Offrir le Mandat à [ham_slot_8.GetName]"
 ham_events.1.oc:0 "À la réflexion, la faveur du Ciel demeure nôtre."
 ham_events.3.t:0 "Le Mandat a été transmis"
 ham_events.3.d:0 "Comme Yao éleva jadis Shun depuis les champs, nous avons élevé [From.GetName] au Trône Céleste. Les rites sont accomplis ; le plus capable règne désormais, et le nom de notre dynastie rejoint celui des rois-sages qui surent céder. Nos tributaires observent attentivement : suivront-ils le Mandat auprès de son nouveau détenteur, ou resteront-ils liés à nous ?"
 ham_events.3.o_release:0 "Que nos tributaires suivent le Mandat."
 ham_events.3.o_keep:0 "Nos tributaires restent nôtres."
 ham_events.3.o_done:0 "C'est accompli."
 ham_events.4.t:0 "Une offre du Fils du Ciel"
 ham_events.4.d:0 "Des émissaires de [From.GetName] arrivent porteurs d'une offre inouïe de mémoire d'homme, mais ancienne comme Yao et Shun : le Fils du Ciel nous juge les plus capables de porter le Mandat Céleste et souhaite nous le céder librement. Un Mandat librement donné ne porte aucune malédiction - seulement la faveur du Ciel envers les dignes."
 ham_events.4.a:0 "Nous acceptons humblement la faveur du Ciel."
 ham_events.4.r:0 "Nous devons décliner ce cadeau empoisonné."
 ham_events.5.t:0 "L'offre est refusée"
 ham_events.5.d:0 "[From.GetName] a décliné le Mandat Céleste, comme l'ermite Xu You se lava jadis les oreilles à l'offre du trône par Yao. La cour est stupéfaite - qui donc refuse la faveur du Ciel lui-même ? Peut-être qu'un autre candidat se montrera plus disposé."
 ham_events.5.oa:0 "Présenter un autre candidat."
 ham_events.5.ob:0 "La volonté du Ciel est capricieuse. Nous garderons le Mandat."
 ham_grateful_for_mandate:0 "A reçu le Mandat librement"
 ham_snubbed_candidate:0 "Écarté du Mandat"
 ham_refused_mandate:0 "A refusé le Mandat"
