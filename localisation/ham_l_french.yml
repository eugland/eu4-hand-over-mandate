l_french:
 hand_over_mandate_decision_title:0 "Transmettre le Mandat Céleste"
 hand_over_mandate_decision_desc:0 "Le fardeau du Ciel pèse lourdement sur le trône. Le Fils du Ciel peut offrir le Mandat à un voisin ou à un tributaire digne de son choix - s'il l'accepte. Une fois le Mandat transmis, cinq années doivent s'écouler avant qu'il ne puisse l'être à nouveau."
 ham_events.1.t:0 "Abdication du Fils du Ciel"
 ham_events.1.d:0 "Les astrologues de la cour ont lu les présages : la vertu de la dynastie décline, et la faveur du Ciel peut être transmise avec grâce plutôt que perdue dans le feu et la rébellion. Les ministres présentent les candidats les plus dignes de recevoir le Mandat."
 ham_events.1.o1:0 "Offrir le Mandat à [ham_slot_1.GetName]"
 ham_events.1.o2:0 "Offrir le Mandat à [ham_slot_2.GetName]"
 ham_events.1.o3:0 "Offrir le Mandat à [ham_slot_3.GetName]"
 ham_events.1.o4:0 "Offrir le Mandat à [ham_slot_4.GetName]"
 ham_events.1.o5:0 "Offrir le Mandat à [ham_slot_5.GetName]"
 ham_events.1.o6:0 "Offrir le Mandat à [ham_slot_6.GetName]"
 ham_events.1.o7:0 "Offrir le Mandat à [ham_slot_7.GetName]"
 ham_events.1.o8:0 "Offrir le Mandat à [ham_slot_8.GetName]"
 ham_events.1.oc:0 "À la réflexion, la faveur du Ciel demeure nôtre."
 ham_events.3.t:0 "Le Mandat a été transmis"
 ham_events.3.d:0 "Lors d'une cérémonie d'une humilité sans précédent, notre cour a cédé le Mandat Céleste à [From.GetName]. Le Fils du Ciel règne désormais depuis leur cour. Nos tributaires observent attentivement : suivront-ils le Mandat auprès de son nouveau détenteur, ou resteront-ils liés à nous ?"
 ham_events.3.o_release:0 "Que nos tributaires suivent le Mandat."
 ham_events.3.o_keep:0 "Nos tributaires restent nôtres."
 ham_events.3.o_done:0 "C'est accompli."
 ham_events.4.t:0 "Une offre du Fils du Ciel"
 ham_events.4.d:0 "Des émissaires de [From.GetName] arrivent porteurs d'une offre sans précédent : le Fils du Ciel souhaite céder le Mandat Céleste à notre nation, transmettant la faveur du Ciel avec grâce plutôt que de la perdre dans le feu et la rébellion."
 ham_events.4.a:0 "Nous acceptons humblement la faveur du Ciel."
 ham_events.4.r:0 "Nous devons décliner ce cadeau empoisonné."
 ham_events.5.t:0 "L'offre est refusée"
 ham_events.5.d:0 "[From.GetName] a décliné le Mandat Céleste. La cour est stupéfaite - qui donc refuse la faveur du Ciel lui-même ? Peut-être qu'un autre candidat se montrera plus disposé."
 ham_events.5.oa:0 "Présenter un autre candidat."
 ham_events.5.ob:0 "La volonté du Ciel est capricieuse. Nous garderons le Mandat."
 ham_grateful_for_mandate:0 "Reconnaissant pour le Mandat"
 ham_snubbed_candidate:0 "Écarté du Mandat"
 ham_refused_mandate:0 "A refusé le Mandat"
