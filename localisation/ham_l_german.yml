l_german:
 hand_over_mandate_decision_title:0 "Das Mandat übergeben"
 hand_over_mandate_decision_desc:0 "Die Bürde des Himmels lastet schwer auf dem Thron. Der Sohn des Himmels kann das Mandat einem würdigen Nachbarn oder Tributstaat seiner Wahl anbieten - sofern dieser annimmt. Nach einer Übergabe müssen fünf Jahre vergehen, ehe das Mandat erneut übergeben werden kann."
 ham_events.1.t:0 "Abdankung des Sohnes des Himmels"
 ham_events.1.d:0 "Die Hofastrologen haben die Zeichen gedeutet: Die Tugend der Dynastie schwindet, und die Gunst des Himmels kann in Würde weitergegeben werden, statt in Feuer und Rebellion verloren zu gehen. Die Minister stellen die stärksten Kandidaten vor, die des Mandats würdig sind."
 ham_events.1.o1:0 "[ham_slot_1.GetName] das Mandat anbieten"
 ham_events.1.o2:0 "[ham_slot_2.GetName] das Mandat anbieten"
 ham_events.1.o3:0 "[ham_slot_3.GetName] das Mandat anbieten"
 ham_events.1.o4:0 "[ham_slot_4.GetName] das Mandat anbieten"
 ham_events.1.o5:0 "[ham_slot_5.GetName] das Mandat anbieten"
 ham_events.1.o6:0 "[ham_slot_6.GetName] das Mandat anbieten"
 ham_events.1.o7:0 "[ham_slot_7.GetName] das Mandat anbieten"
 ham_events.1.o8:0 "[ham_slot_8.GetName] das Mandat anbieten"
 ham_events.1.oc:0 "Bei näherer Betrachtung bleibt die Gunst des Himmels bei uns."
 ham_events.3.t:0 "Das Mandat ist übergegangen"
 ham_events.3.d:0 "In einer Zeremonie beispielloser Demut hat unser Hof das Mandat des Himmels an [From.GetName] abgetreten. Der Sohn des Himmels regiert nun von deren Hof aus. Unsere Tributstaaten beobachten genau: Folgen sie dem Mandat zu seinem neuen Hüter, oder bleiben sie an uns gebunden?"
 ham_events.3.o_release:0 "Unsere Tributstaaten mögen dem Mandat folgen."
 ham_events.3.o_keep:0 "Unsere Tributstaaten bleiben unser."
 ham_events.3.o_done:0 "Es ist vollbracht."
 ham_events.4.t:0 "Ein Angebot des Sohnes des Himmels"
 ham_events.4.d:0 "Gesandte aus [From.GetName] überbringen ein Angebot ohne Beispiel: Der Sohn des Himmels möchte das Mandat des Himmels an unsere Nation abtreten und die Gunst des Himmels in Würde weitergeben, statt sie in Feuer und Rebellion zu verlieren."
 ham_events.4.a:0 "Wir nehmen die Gunst des Himmels demütig an."
 ham_events.4.r:0 "Wir müssen dieses vergiftete Geschenk ablehnen."
 ham_events.5.t:0 "Das Angebot wird abgelehnt"
 ham_events.5.d:0 "[From.GetName] hat das Mandat des Himmels abgelehnt. Der Hof ist fassungslos - wer weist die Gunst des Himmels selbst zurück? Vielleicht erweist sich ein anderer Kandidat als williger."
 ham_events.5.oa:0 "Einen anderen Kandidaten vorstellen."
 ham_events.5.ob:0 "Der Wille des Himmels ist launisch. Wir behalten das Mandat."
 ham_grateful_for_mandate:0 "Dankbar für das Mandat"
 ham_snubbed_candidate:0 "Beim Mandat übergangen"
 ham_refused_mandate:0 "Hat das Mandat abgelehnt"
