l_german:
 hand_over_mandate_decision_title:0 "Das Mandat übergeben"
 hand_over_mandate_decision_desc:0 "Im goldenen Zeitalter überließ Yao den Thron Shun, und Shun überließ ihn Yu - nicht ihren Söhnen, sondern den Fähigsten, und der Himmel billigte es. Der Sohn des Himmels kann dem Weg der weisen Könige folgen und das Mandat einem würdigen Nachbarn oder Tributstaat seiner Wahl übergeben - sofern dieser annimmt. Ein frei gegebenes Mandat geht niemals verloren: Kein Unheil trifft den Weisen, der weicht. Nach einer Übergabe müssen fünf Jahre vergehen, ehe das Mandat erneut übergeben werden kann."
 ham_events.1.t:0 "Abdankung des Sohnes des Himmels"
 ham_events.1.d:0 "Die Hofastrologen haben die Zeichen gedeutet: Die Tugend der Dynastie schwindet. Die Minister erinnern an den Weg von Yao und Shun, von Yu und Tang - der Thron frei an den Fähigsten übergeben, und der Himmel lächelte dazu. Besser das Mandat in Würde abtreten, als es in Feuer und Rebellion zu verlieren. Die Minister stellen die stärksten Kandidaten vor, die seiner würdig sind."
 ham_events.1.o1:0 "[ham_slot_1.GetName] das Mandat anbieten"
 ham_events.1.o2:0 "[ham_slot_2.GetName] das Mandat anbieten"
 ham_events.1.o3:0 "[ham_slot_3.GetName] das Mandat anbieten"
 ham_events.1.o4:0 "[ham_slot_4.GetName] das Mandat anbieten"
 ham_events.1.o5:0 "[ham_slot_5.GetName] das Mandat anbieten"
 ham_events.1.o6:0 "[ham_slot_6.GetName] das Mandat anbieten"
 ham_events.1.o7:0 "[ham_slot_7.GetName] das Mandat anbieten"
 ham_events.1.o8:0 "[ham_slot_8.GetName] das Mandat anbieten"
 ham_events.1.oc:0 "Bei näherer Betrachtung bleibt die Gunst des Himmels bei uns."
 ham_events.3.t:0 "Das Mandat ist übergegangen"
 ham_events.3.d:0 "Wie Yao einst Shun von den Feldern erhob, so haben wir [From.GetName] auf den Himmlischen Thron erhoben. Die Riten sind vollzogen; der Fähigste regiert nun, und der Name unserer Dynastie reiht sich ein unter die weisen Könige, die zu weichen wussten. Unsere Tributstaaten beobachten genau: Folgen sie dem Mandat zu seinem neuen Hüter, oder bleiben sie an uns gebunden?"
 ham_events.3.o_release:0 "Unsere Tributstaaten mögen dem Mandat folgen."
 ham_events.3.o_keep:0 "Unsere Tributstaaten bleiben unser."
 ham_events.3.o_done:0 "Es ist vollbracht."
 ham_events.4.t:0 "Ein Angebot des Sohnes des Himmels"
 ham_events.4.d:0 "Gesandte aus [From.GetName] überbringen ein Angebot, unerhört seit Menschengedenken und doch alt wie Yao und Shun: Der Sohn des Himmels erachtet uns als die Fähigsten, das Mandat des Himmels zu tragen, und möchte es uns frei überlassen. Ein frei gegebenes Mandat trägt keinen Fluch - nur die Gunst des Himmels für die Würdigen."
 ham_events.4.a:0 "Wir nehmen die Gunst des Himmels demütig an."
 ham_events.4.r:0 "Wir müssen dieses vergiftete Geschenk ablehnen."
 ham_events.5.t:0 "Das Angebot wird abgelehnt"
 ham_events.5.d:0 "[From.GetName] hat das Mandat des Himmels abgelehnt, wie einst der Einsiedler Xu You sich die Ohren wusch, als Yao ihm den Thron anbot. Der Hof ist fassungslos - wer weist die Gunst des Himmels selbst zurück? Vielleicht erweist sich ein anderer Kandidat als williger."
 ham_events.5.oa:0 "Einen anderen Kandidaten vorstellen."
 ham_events.5.ob:0 "Der Wille des Himmels ist launisch. Wir behalten das Mandat."
 ham_grateful_for_mandate:0 "Erhielt das Mandat aus freien Stücken"
 ham_snubbed_candidate:0 "Beim Mandat übergangen"
 ham_refused_mandate:0 "Hat das Mandat abgelehnt"
